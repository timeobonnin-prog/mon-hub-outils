<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Complet – Speed Test intégré</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0ff;
            padding-top: 80px;
        }
        .bg-particles {
            position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0;
        }
        .particle {
            position: absolute; width:2px; height:2px; background:#00e5ff; border-radius:50%;
            animation: float 6s infinite alternate; opacity:0.4;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-50px) translateX(20px); opacity:0.1; }
        }
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(20,20,40,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid #00e5ff44;
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
            padding: 10px; z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .nav-btn {
            background: transparent; border: 1px solid #00e5ff; color: #00e5ff;
            padding: 8px 14px; border-radius: 20px; font-weight: bold;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
            letter-spacing: 0.5px; font-size: 0.8rem;
        }
        .nav-btn.active {
            background: #00e5ff; color: #0a0a14; box-shadow: 0 0 20px #00e5ff;
        }
        .app {
            background: rgba(20,20,40,0.75); backdrop-filter: blur(25px);
            border-radius: 24px; border: 1px solid rgba(0,229,255,0.25);
            box-shadow: 0 0 40px rgba(0,229,255,0.15);
            width: 100%; max-width: 650px; padding: 20px; z-index: 1;
            display: flex; flex-direction: column; gap: 20px; margin: 20px;
        }
        .tab { display: none; animation: fade 0.3s; }
        .tab.active { display: block; }
        @keyframes fade {
            from { opacity:0; transform: translateY(5px); }
            to { opacity:1; transform: translateY(0); }
        }
        /* Styles communs */
        .card { background: rgba(255,255,255,0.03); border: 1px solid #b388ff; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input, select, textarea {
            background: rgba(255,255,255,0.05); border: 1px solid #b388ff;
            border-radius: 10px; color: #e0e0ff; padding: 10px 12px;
            font-size: 1rem; outline: none;
        }
        .action-btn {
            background: rgba(255,255,255,0.05); border: 1px solid #00e5ff;
            color: #00e5ff; padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-size: 0.8rem; transition: 0.2s;
        }
        .action-btn:hover { background: #00e5ff; color: #000; }
        .pomo-btn { background: #00e5ff; color: #0a0a14; border: none; font-weight: bold; padding: 10px 25px; border-radius: 20px; cursor: pointer; }
        .pomo-btn.reset { background: transparent; border: 1px solid #ff4081; color: #ff4081; }

        /* Calculatrice */
        .calc-display { background: rgba(10,15,25,0.8); border: 1px solid #b388ff; border-radius: 12px; padding: 20px 15px; font-size: 2rem; text-align: right; color: #e0e0ff; min-height: 70px; word-break: break-all; margin-bottom: 15px; }
        .calc-history-toggle { text-align: right; margin-bottom: 5px; }
        .calc-history-toggle button { background: transparent; border: 1px solid #00e5ff; color: #00e5ff; padding: 5px 12px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; }
        .calc-history { display: none; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-bottom: 15px; max-height: 200px; overflow-y: auto; font-size: 0.9rem; }
        .calc-history.open { display: block; }
        .history-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .history-item:hover { background: rgba(0,229,255,0.1); }
        .clear-history { margin-top: 5px; text-align: right; }
        .clear-history button { background: #ff4081; border: none; color: white; padding: 4px 10px; border-radius: 8px; cursor: pointer; }
        .keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key { background: rgba(255,255,255,0.05); border: 1px solid #00e5ff; color: #00e5ff; padding: 16px 0; border-radius: 12px; font-size: 1.2rem; cursor: pointer; text-align: center; font-weight: bold; }
        .key:active { background: #00e5ff; color: #000; }
        .key.operator { border-color: #ff4081; color: #ff4081; }
        .key.operator:active { background: #ff4081; color: white; }
        .key.equals { background: #00e5ff; color: #0a0a14; }
        .key.clear { border-color: #ff4081; color: #ff4081; }

        /* Convertisseur */
        .excel-table { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #00e5ff55; border-radius: 10px; overflow: hidden; }
        .excel-header { background: rgba(0,229,255,0.2); padding: 12px; font-weight: bold; color: #00e5ff; text-align: center; }
        .excel-cell { background: rgba(255,255,255,0.03); padding: 14px 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .excel-cell:hover { background: rgba(0,229,255,0.08); }

        /* Chrono */
        .chrono-display { font-size: 3.5rem; text-align: center; color: #00e5ff; cursor: pointer; }

        /* Mdp */
        .strength-meter { width: 100%; height: 10px; background: #333; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; background: #ff4081; border-radius: 10px; transition: width 0.3s; }

        /* QR */
        .qr-container { text-align: center; }
        .qr-container img { background: white; padding: 10px; border-radius: 12px; }

        /* Partage */
        .share-buttons a { background: rgba(255,255,255,0.05); border: 1px solid #b388ff; border-radius: 12px; padding: 10px 15px; color: #b388ff; text-decoration: none; margin: 5px; display: inline-block; }

        /* Texte */
        .sub-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .sub-tab-btn { background: transparent; border: 1px solid #b388ff; color: #b388ff; padding: 6px 12px; border-radius: 15px; cursor: pointer; }
        .sub-tab-btn.active { background: #b388ff; color: #0a0a14; }
        .sub-panel { display: none; }
        .sub-panel.active { display: block; }

        /* Speed Test */
        .speed-test-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .gauge {
            position: relative;
            width: 200px;
            height: 200px;
        }
        .gauge-circle {
            transform: rotate(-90deg);
            width: 200px;
            height: 200px;
        }
        .gauge-bg {
            fill: none;
            stroke: #333;
            stroke-width: 12;
        }
        .gauge-fill {
            fill: none;
            stroke: #00e5ff;
            stroke-width: 12;
            stroke-dasharray: 565.48; /* 2 * PI * 90 */
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 0.2s;
        }
        .gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #00e5ff;
        }
        .speed-info {
            text-align: center;
            font-size: 1.2rem;
            color: #b388ff;
        }
    </style>
</head>
<body>
<div class="bg-particles" id="particles"></div>

<div class="top-nav" id="topNav">
    <button class="nav-btn active" data-tab="calc">🧮 Calc</button>
    <button class="nav-btn" data-tab="conv">🔄 Conv</button>
    <button class="nav-btn" data-tab="chrono">⏱️ Chrono</button>
    <button class="nav-btn" data-tab="pass">🔐 Mdp</button>
    <button class="nav-btn" data-tab="qr">📱 QR</button>
    <button class="nav-btn" data-tab="share">📤 Partager</button>
    <button class="nav-btn" data-tab="speed">⚡ Speed</button>
    <button class="nav-btn" data-tab="text">🔤 Texte</button>
</div>

<div class="app">
    <!-- Tous les onglets précédents (identiques) -->
    <!-- Calculatrice avec historique -->
    <div class="tab active" id="tab-calc">
        <div class="calc-display" id="calcDisplay">0</div>
        <div class="calc-history-toggle">
            <button id="toggleHistory">📋 Historique</button>
        </div>
        <div class="calc-history" id="calcHistory">
            <div id="historyList"></div>
            <div class="clear-history">
                <button id="clearHistory">Effacer historique</button>
            </div>
        </div>
        <div class="keys">
            <button class="key clear" data-action="clear">AC</button>
            <button class="key" data-action="back">⌫</button>
            <button class="key" data-action="pi">π</button>
            <button class="key operator" data-action="/">÷</button>
            <button class="key" data-action="7">7</button>
            <button class="key" data-action="8">8</button>
            <button class="key" data-action="9">9</button>
            <button class="key operator" data-action="*">×</button>
            <button class="key" data-action="4">4</button>
            <button class="key" data-action="5">5</button>
            <button class="key" data-action="6">6</button>
            <button class="key operator" data-action="-">−</button>
            <button class="key" data-action="1">1</button>
            <button class="key" data-action="2">2</button>
            <button class="key" data-action="3">3</button>
            <button class="key operator" data-action="+">+</button>
            <button class="key" data-action="0">0</button>
            <button class="key" data-action=".">.</button>
            <button class="key" data-action="sqrt">√</button>
            <button class="key equals" data-action="=">=</button>
        </div>
    </div>

    <!-- Convertisseur grand tableau -->
    <div class="tab" id="tab-conv">
        <div class="conv-container">
            <select id="unitCategory">
                <option value="volume">Volume</option>
                <option value="masse">Masse</option>
                <option value="longueur">Longueur</option>
                <option value="température">Température</option>
            </select>
            <div class="ref-row">
                <input type="number" id="refValue" value="1" step="any">
                <select id="refUnit"></select>
                <div class="arrow-btns">
                    <button class="arrow-btn" id="increaseBtn">▲</button>
                    <button class="arrow-btn" id="decreaseBtn">▼</button>
                </div>
            </div>
            <div class="excel-table" id="excelTable"></div>
            <div class="copy-hint">Clique sur une valeur pour la copier</div>
        </div>
    </div>

    <!-- Chronomètre -->
    <div class="tab" id="tab-chrono">
        <div class="chrono-display" id="chronoDisplay">
            <span id="chronoTime">00:00</span>
            <input type="text" id="chronoInput" placeholder="ex: 3.12" style="display:none;">
        </div>
        <div class="ref-row" style="justify-content:center;">
            <button class="pomo-btn" id="chronoStart">Démarrer</button>
            <button class="pomo-btn reset" id="chronoReset">Reset</button>
        </div>
    </div>

    <!-- Vérificateur MDP -->
    <div class="tab" id="tab-pass">
        <input type="text" id="passwordInput" placeholder="Tape un mot de passe" autocomplete="off" style="width:100%; margin-bottom:10px;">
        <div class="strength-meter"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel">Entrez un mot de passe</div>
        <ul style="color:#b388ff; font-size:0.85rem; margin-top:10px; padding-left:20px;">
            <li>8+ caractères</li><li>Majuscules & minuscules</li><li>Chiffres</li><li>Symboles</li>
        </ul>
    </div>

    <!-- QR Code -->
    <div class="tab" id="tab-qr">
        <div class="qr-container">
            <input type="text" id="qrText" placeholder="Texte ou URL" style="width:100%; margin-bottom:10px;">
            <button class="pomo-btn" id="qrGenerate">Créer QR</button>
            <div style="margin-top:15px;">
                <img id="qrImage" src="" alt="QR Code" style="display:none; max-width:200px;">
            </div>
            <div class="qr-actions" id="qrActions" style="display:none;">
                <button class="action-btn" id="qrDownload">💾 Télécharger</button>
                <button class="action-btn" id="qrCopy">📋 Copier image</button>
                <button class="action-btn" id="qrShare">📤 Partager</button>
            </div>
        </div>
    </div>

    <!-- Partage -->
    <div class="tab" id="tab-share">
        <div class="share-section">
            <h3 style="color:#b388ff;">Partage ce site</h3>
            <div class="share-link-box">
                <input type="text" id="siteUrl" readonly value="https://timeobonnin-prog.github.io/mon-hub-outils/">
                <button class="action-btn" id="copySiteUrl">Copier</button>
            </div>
            <div class="share-buttons">
                <a class="share-icon" href="#" id="shareWhatsApp" target="_blank">💬 WhatsApp</a>
                <a class="share-icon" href="#" id="shareFacebook" target="_blank">📘 Facebook</a>
                <a class="share-icon" href="#" id="shareTwitter" target="_blank">🐦 Twitter</a>
                <a class="share-icon" href="#" id="shareMail" target="_blank">✉️ Email</a>
            </div>
            <div class="github-link">
                🔗 Code source sur <a href="https://github.com/timeobonnin-prog/mon-hub-outils" target="_blank">GitHub</a>
            </div>
        </div>
    </div>

    <!-- Onglet Speed Test simplifié -->
    <div class="tab" id="tab-speed">
        <div class="speed-test-container">
            <h3 style="color:#b388ff;">⚡ Test de vitesse Internet</h3>
            <div class="gauge" id="gaugeContainer">
                <svg class="gauge-circle" viewBox="0 0 200 200">
                    <circle class="gauge-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="gauge-fill" id="gaugeFill" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="gauge-text" id="gaugeText">0 Mbps</div>
            </div>
            <button class="pomo-btn" id="startSpeedTest">Démarrer le test (20s)</button>
            <div class="speed-info" id="speedInfo"></div>
        </div>
    </div>

    <!-- Outil Texte (Conversion bases, Chiffrement, Obfuscation) -->
    <div class="tab" id="tab-text">
        <div class="text-tools">
            <div class="sub-tabs">
                <button class="sub-tab-btn active" data-sub="bases">🔢 Conversion bases</button>
                <button class="sub-tab-btn" data-sub="crypto">🔐 Chiffrement</button>
                <button class="sub-tab-btn" data-sub="obfus">🔄 Obfuscation</button>
            </div>
            <!-- Conversion de bases -->
            <div class="sub-panel active" id="sub-bases">
                <textarea id="baseInput" placeholder="Texte ou nombres..."></textarea>
                <div class="row">
                    <select id="baseFrom">
                        <option value="auto">Détection auto.</option>
                        <option value="text">Texte</option>
                        <option value="dec">Décimal</option>
                        <option value="hex">Hexadécimal</option>
                        <option value="oct">Octal</option>
                        <option value="bin">Binaire</option>
                    </select>
                    <span style="color:#00e5ff;">→</span>
                    <select id="baseTo">
                        <option value="text">Texte</option>
                        <option value="dec">Décimal</option>
                        <option value="hex" selected>Hexadécimal</option>
                        <option value="oct">Octal</option>
                        <option value="bin">Binaire</option>
                    </select>
                    <button class="action-btn" id="baseConvert">Convertir</button>
                </div>
                <textarea id="baseOutput" placeholder="Sortie..." readonly></textarea>
            </div>
            <!-- Chiffrement -->
            <div class="sub-panel" id="sub-crypto">
                <textarea id="cryptoInput" placeholder="Texte à chiffrer / déchiffrer"></textarea>
                <div class="row">
                    <select id="cryptoMethod">
                        <option value="caesar">César</option>
                        <option value="rot13">ROT13</option>
                        <option value="vigenere">Vigenère</option>
                    </select>
                    <input type="text" id="cryptoKey" placeholder="Clé / Décalage" value="3" style="width:100px;">
                    <button class="action-btn" id="cryptoEncrypt">Chiffrer</button>
                    <button class="action-btn" id="cryptoDecrypt">Déchiffrer</button>
                </div>
                <textarea id="cryptoOutput" placeholder="Résultat..." readonly></textarea>
            </div>
            <!-- Obfuscation -->
            <div class="sub-panel" id="sub-obfus">
                <textarea id="obfusInput" placeholder="Texte à obfusquer"></textarea>
                <div class="row">
                    <button class="pomo-btn" id="obfusRotate">Rotation 180°</button>
                    <button class="pomo-btn reset" id="obfusShuffle">Retournement aléatoire</button>
                </div>
                <textarea id="obfusOutput" placeholder="Résultat..." readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
(() => {
    // Particules
    for (let i=0; i<40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'%';
        p.style.top = Math.random()*100+'%';
        p.style.animationDelay = Math.random()*8+'s';
        p.style.background = i%2 ? '#00e5ff' : '#b388ff';
        document.getElementById('particles').appendChild(p);
    }

    // Navigation principale
    document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn[data-tab]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const target = document.getElementById('tab-' + btn.dataset.tab);
            if (target) target.classList.add('active');
        });
    });

    // ========== CALCULATRICE + HISTORIQUE ==========
    let expression = '';
    const calcDisplay = document.getElementById('calcDisplay');
    const historyListEl = document.getElementById('historyList');
    const calcHistoryEl = document.getElementById('calcHistory');
    const toggleHistoryBtn = document.getElementById('toggleHistory');
    const clearHistoryBtn = document.getElementById('clearHistory');
    let history = JSON.parse(localStorage.getItem('calcHistory')) || [];
    function saveHistory() { localStorage.setItem('calcHistory', JSON.stringify(history)); }
    function renderHistory() {
        historyListEl.innerHTML = '';
        if (history.length === 0) { historyListEl.innerHTML = '<div style="color:#888;">Aucun calcul</div>'; return; }
        [...history].reverse().forEach(item => {
            const row = document.createElement('div');
            row.className = 'history-item';
            row.innerHTML = `<span class="expr">${item.expr}</span> <span class="res">= ${item.res}</span>`;
            row.addEventListener('click', () => { expression = item.expr; updateCalcDisplay(); calcHistoryEl.classList.remove('open'); });
            historyListEl.appendChild(row);
        });
    }
    function addToHistory(expr, res) {
        if (history.length > 0 && history[history.length-1].expr === expr && history[history.length-1].res === res) return;
        history.push({ expr, res });
        if (history.length > 20) history.shift();
        saveHistory(); renderHistory();
    }
    clearHistoryBtn.addEventListener('click', () => { history = []; saveHistory(); renderHistory(); });
    toggleHistoryBtn.addEventListener('click', () => calcHistoryEl.classList.toggle('open'));
    function updateCalcDisplay() { calcDisplay.textContent = expression || '0'; }
    document.querySelector('.keys').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const action = btn.dataset.action;
        if (action === 'clear') { expression = ''; updateCalcDisplay(); }
        else if (action === 'back') { expression = expression.slice(0, -1); updateCalcDisplay(); }
        else if (action === '=') {
            try {
                let ex = expression.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
                ex = ex.replace(/π/g, Math.PI).replace(/√/g, 'Math.sqrt');
                const result = Function('"use strict"; return ('+ex+')')();
                addToHistory(expression, result);
                expression = result.toString();
                updateCalcDisplay();
            } catch { calcDisplay.textContent = 'Erreur'; expression = ''; }
        } else if (action === 'sqrt') { expression += '√('; updateCalcDisplay(); }
        else if (action === 'pi') { expression += 'π'; updateCalcDisplay(); }
        else { expression += action; updateCalcDisplay(); }
    });
    renderHistory();

    // ========== CONVERTISSEUR UNITÉS ==========
    const unitData = {
        volume: { units: { 'litre (L)':1, 'millilitre (mL)':1000, 'mètre cube (m³)':0.001, 'gallon US':0.264172, 'pinte US':2.11338, 'cuillère à soupe':66.6667 }, base: 'litre (L)' },
        masse: { units: { 'kilogramme (kg)':1, 'gramme (g)':1000, 'milligramme (mg)':1e6, 'livre (lb)':2.20462, 'once (oz)':35.274 }, base: 'kilogramme (kg)' },
        longueur: { units: { 'mètre (m)':1, 'kilomètre (km)':0.001, 'centimètre (cm)':100, 'millimètre (mm)':1000, 'pied (ft)':3.28084, 'pouce (in)':39.3701, 'mile':0.000621371 }, base: 'mètre (m)' },
        température: { units: { 'Celsius': 'c', 'Fahrenheit': 'f', 'Kelvin': 'k' }, base: 'Celsius' }
    };
    const categorySelect = document.getElementById('unitCategory');
    const refValueInput = document.getElementById('refValue');
    const refUnitSelect = document.getElementById('refUnit');
    const excelTable = document.getElementById('excelTable');
    function populateUnits() {
        const cat = categorySelect.value;
        refUnitSelect.innerHTML = '';
        Object.keys(unitData[cat].units).forEach(u => refUnitSelect.innerHTML += `<option value="${u}">${u}</option>`);
        refUnitSelect.value = unitData[cat].base;
        updateTable();
    }
    function updateTable() {
        const cat = categorySelect.value;
        const value = parseFloat(refValueInput.value);
        if (isNaN(value)) { excelTable.innerHTML = '<div style="padding:20px; color:#ff4081;">Valeur invalide</div>'; return; }
        const refUnit = refUnitSelect.value;
        const units = unitData[cat].units;
        let html = `<div class="excel-header">Unité</div><div class="excel-header">Valeur</div>`;
        for (let unit in units) {
            let converted;
            if (cat === 'température') {
                let celsius = refUnit === 'Celsius' ? value : refUnit === 'Fahrenheit' ? (value-32)*5/9 : value-273.15;
                if (unit === 'Celsius') converted = celsius;
                else if (unit === 'Fahrenheit') converted = celsius*9/5+32;
                else converted = celsius+273.15;
            } else {
                converted = (value / units[refUnit]) * units[unit];
            }
            html += `<div class="excel-cell"><span class="unit-name">${unit}</span></div>
                     <div class="excel-cell" data-copy="${converted.toFixed(4)}"><span class="unit-value">${converted.toFixed(4)}</span></div>`;
        }
        excelTable.innerHTML = html;
        document.querySelectorAll('.excel-cell[data-copy]').forEach(cell => {
            cell.addEventListener('click', () => {
                navigator.clipboard.writeText(cell.dataset.copy);
                cell.style.background = 'rgba(0,229,255,0.2)';
                setTimeout(() => cell.style.background = '', 200);
            });
        });
    }
    categorySelect.addEventListener('change', populateUnits);
    refValueInput.addEventListener('input', updateTable);
    refUnitSelect.addEventListener('change', updateTable);
    document.getElementById('increaseBtn').addEventListener('click', () => { refValueInput.value = (parseFloat(refValueInput.value)||0)+1; updateTable(); });
    document.getElementById('decreaseBtn').addEventListener('click', () => { refValueInput.value = (parseFloat(refValueInput.value)||0)-1; updateTable(); });
    populateUnits();

    // ========== CHRONOMÈTRE ==========
    let chronoInterval, chronoRemaining = 0, chronoRunning = false;
    const chronoTimeSpan = document.getElementById('chronoTime');
    const chronoInput = document.getElementById('chronoInput');
    const chronoStartBtn = document.getElementById('chronoStart');
    const chronoResetBtn = document.getElementById('chronoReset');
    function formatChrono(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
    function updateChronoDisplay() { chronoTimeSpan.textContent = formatChrono(chronoRemaining); }
    function stopChrono() { clearInterval(chronoInterval); chronoRunning = false; chronoStartBtn.textContent = 'Démarrer'; }
    chronoTimeSpan.addEventListener('click', () => {
        chronoTimeSpan.style.display = 'none';
        chronoInput.style.display = 'inline-block';
        chronoInput.value = `${Math.floor(chronoRemaining/60)}.${String(chronoRemaining%60).padStart(2,'0')}`;
        chronoInput.focus();
    });
    chronoInput.addEventListener('blur', applyCustomTime);
    chronoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { applyCustomTime(); chronoInput.blur(); } });
    function applyCustomTime() {
        const raw = chronoInput.value.trim();
        let m = 0, s = 0;
        if (raw.includes('.')) { const [mm, ss] = raw.split('.'); m = parseInt(mm)||0; s = parseInt(ss)||0; }
        else { m = parseInt(raw)||0; }
        chronoRemaining = m*60 + s;
        updateChronoDisplay();
        chronoTimeSpan.style.display = '';
        chronoInput.style.display = 'none';
        if (chronoRunning) stopChrono();
    }
    chronoStartBtn.addEventListener('click', () => {
        if (chronoRunning) stopChrono();
        else if (chronoRemaining > 0) {
            chronoInterval = setInterval(() => {
                if (chronoRemaining > 0) { chronoRemaining--; updateChronoDisplay(); }
                else { stopChrono(); alert('⏰ Temps écoulé !'); }
            }, 1000);
            chronoRunning = true;
            chronoStartBtn.textContent = 'Pause';
        }
    });
    chronoResetBtn.addEventListener('click', () => { stopChrono(); chronoRemaining = 0; updateChronoDisplay(); chronoStartBtn.textContent = 'Démarrer'; });

    // ========== VÉRIFICATEUR MDP ==========
    const passwordInput = document.getElementById('passwordInput');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');
    passwordInput.addEventListener('input', () => {
        const pwd = passwordInput.value;
        let score = 0;
        if (pwd.length >= 8) score++;
        if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
        if (/\d/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        strengthFill.style.width = (score/4)*100 + '%';
        if (!pwd) { strengthFill.style.width = '0%'; strengthLabel.textContent = 'Entrez un mot de passe'; strengthLabel.style.color = '#b388ff'; }
        else if (score <= 1) { strengthFill.style.background = '#ff4081'; strengthLabel.textContent = 'Faible'; strengthLabel.style.color = '#ff4081'; }
        else if (score <= 3) { strengthFill.style.background = '#ffb74d'; strengthLabel.textContent = 'Moyen'; strengthLabel.style.color = '#ffb74d'; }
        else { strengthFill.style.background = '#66bb6a'; strengthLabel.textContent = 'Fort'; strengthLabel.style.color = '#66bb6a'; }
    });

    // ========== QR CODE ==========
    const qrText = document.getElementById('qrText');
    const qrImage = document.getElementById('qrImage');
    const qrActions = document.getElementById('qrActions');
    document.getElementById('qrGenerate').addEventListener('click', () => {
        const text = qrText.value.trim();
        if (!text) return;
        qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
        qrImage.style.display = 'block';
        qrActions.style.display = 'flex';
    });
    document.getElementById('qrDownload').addEventListener('click', async () => {
        if (!qrImage.src) return;
        const blob = await fetch(qrImage.src).then(r => r.blob());
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'qr-code.png'; a.click();
    });
    document.getElementById('qrCopy').addEventListener('click', async () => {
        const blob = await fetch(qrImage.src).then(r => r.blob());
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        alert('Image copiée');
    });
    document.getElementById('qrShare').addEventListener('click', async () => {
        if (navigator.share) {
            const blob = await fetch(qrImage.src).then(r => r.blob());
            await navigator.share({ files: [new File([blob], 'qr-code.png', {type: 'image/png'})] });
        } else alert('Partage non supporté');
    });

    // ========== PARTAGE ==========
    const siteUrl = 'https://timeobonnin-prog.github.io/mon-hub-outils/';
    document.getElementById('siteUrl').value = siteUrl;
    document.getElementById('copySiteUrl').addEventListener('click', () => { navigator.clipboard.writeText(siteUrl); alert('Lien copié'); });
    document.getElementById('shareWhatsApp').href = `https://wa.me/?text=${encodeURIComponent('Découvre ce super outil : ' + siteUrl)}`;
    document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(siteUrl)}`;
    document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent('Super hub d\'outils !')}&url=${encodeURIComponent(siteUrl)}`;
    document.getElementById('shareMail').href = `mailto:?subject=Outil pratique&body=Salut,%0D%0AVoici un lien vers un hub d'outils : ${encodeURIComponent(siteUrl)}`;

    // ========== OUTIL TEXTE ==========
    document.querySelectorAll('.sub-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('sub-' + btn.dataset.sub).classList.add('active');
        });
    });
    function detectType(input) {
        if (/^[01]+$/.test(input)) return 'bin';
        if (/^[0-7]+$/.test(input)) return 'oct';
        if (/^[0-9]+$/.test(input)) return 'dec';
        if (/^[0-9A-Fa-f]+$/.test(input)) return 'hex';
        return 'text';
    }
    function convertBase(input, from, to) {
        if (input === '') return '';
        if (from === 'text') {
            let nums = input.split('').map(c => c.charCodeAt(0));
            return convertFromDecArray(nums, to);
        }
        let decimalArray;
        if (from === 'auto') from = detectType(input);
        switch(from) {
            case 'bin': decimalArray = input.split(' ').map(b => parseInt(b, 2)); break;
            case 'oct': decimalArray = input.split(' ').map(o => parseInt(o, 8)); break;
            case 'dec': decimalArray = input.split(' ').map(d => parseInt(d, 10)); break;
            case 'hex': decimalArray = input.split(' ').map(h => parseInt(h, 16)); break;
            default: return '';
        }
        return convertFromDecArray(decimalArray, to);
    }
    function convertFromDecArray(nums, to) {
        switch(to) {
            case 'text': return nums.map(n => String.fromCharCode(n)).join('');
            case 'bin': return nums.map(n => n.toString(2)).join(' ');
            case 'oct': return nums.map(n => n.toString(8)).join(' ');
            case 'dec': return nums.join(' ');
            case 'hex': return nums.map(n => n.toString(16).toUpperCase()).join(' ');
            default: return '';
        }
    }
    document.getElementById('baseConvert').addEventListener('click', () => {
        const input = document.getElementById('baseInput').value.trim();
        const from = document.getElementById('baseFrom').value;
        const to = document.getElementById('baseTo').value;
        document.getElementById('baseOutput').value = convertBase(input, from, to);
    });
    function caesarShift(text, shift, decrypt = false) {
        shift = shift % 26;
        if (decrypt) shift = (26 - shift) % 26;
        return text.replace(/[a-zA-Z]/g, c => {
            const base = c >= 'a' ? 97 : 65;
            return String.fromCharCode((c.charCodeAt(0) - base + shift) % 26 + base);
        });
    }
    function rot13(text) { return caesarShift(text, 13); }
    function vigenere(text, key, decrypt = false) {
        key = key.toLowerCase().replace(/[^a-z]/g, '');
        if (!key) return text;
        let j = 0;
        return text.replace(/[a-zA-Z]/g, c => {
            const isUpper = c === c.toUpperCase();
            const base = isUpper ? 65 : 97;
            const shift = key.charCodeAt(j % key.length) - 97;
            const dShift = decrypt ? (26 - shift) % 26 : shift;
            const newChar = (c.charCodeAt(0) - base + dShift) % 26 + base;
            j++;
            return String.fromCharCode(newChar);
        });
    }
    function applyCrypto(decrypt = false) {
        const text = document.getElementById('cryptoInput').value;
        const method = document.getElementById('cryptoMethod').value;
        const key = document.getElementById('cryptoKey').value;
        let result = '';
        switch(method) {
            case 'caesar': result = caesarShift(text, parseInt(key)||0, decrypt); break;
            case 'rot13': result = rot13(text); break;
            case 'vigenere': result = vigenere(text, key, decrypt); break;
        }
        document.getElementById('cryptoOutput').value = result;
    }
    document.getElementById('cryptoEncrypt').addEventListener('click', () => applyCrypto(false));
    document.getElementById('cryptoDecrypt').addEventListener('click', () => applyCrypto(true));
    const rotateMap = {
        'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ',
        'k':'ʞ','l':'l','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ',
        'u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z',
        'A':'∀','B':'𐐒','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'⅁','H':'H','I':'I','J':'ſ',
        'K':'⋊','L':'˥','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Ό','R':'ᴚ','S':'S','T':'⊥',
        'U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z',
        '0':'0','1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ㄣ','5':'ϛ','6':'9','7':'ㄥ','8':'8','9':'6',
        '.':'˙',',':'\'','?':'¿','!':'¡','"':'„','\'':',','(':')(',')':'('
    };
    function rotate180(text) {
        return text.split('').map(c => rotateMap[c] || c).reverse().join('');
    }
    function shuffleText(text) {
        const arr = text.split('');
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr.join('');
    }
    document.getElementById('obfusRotate').addEventListener('click', () => {
        document.getElementById('obfusOutput').value = rotate180(document.getElementById('obfusInput').value);
    });
    document.getElementById('obfusShuffle').addEventListener('click', () => {
        document.getElementById('obfusOutput').value = shuffleText(document.getElementById('obfusInput').value);
    });

    // ========== SPEED TEST (NOUVEAU) ==========
    const gaugeFill = document.getElementById('gaugeFill');
    const gaugeText = document.getElementById('gaugeText');
    const speedInfo = document.getElementById('speedInfo');
    const startBtn = document.getElementById('startSpeedTest');
    const circumference = 2 * Math.PI * 90; // environ 565.48

    let testRunning = false;
    let downloadSpeeds = [];

    function updateGauge(percent, speedMbps) {
        const offset = circumference - (percent / 100) * circumference;
        gaugeFill.style.strokeDashoffset = offset;
        gaugeText.textContent = speedMbps.toFixed(1) + ' Mbps';
    }

    async function measureSpeed() {
        const downloadUrl = 'https://speed.cloudflare.com/__down?bytes=5000000'; // 5 Mo
        const start = performance.now();
        try {
            const response = await fetch(downloadUrl, { cache: 'no-cache' });
            const blob = await response.blob();
            const duration = (performance.now() - start) / 1000;
            const bitsLoaded = blob.size * 8;
            const speedBps = bitsLoaded / duration;
            return speedBps / 1000000; // Mbps
        } catch (e) {
            console.warn('Speed test failed', e);
            return 0;
        }
    }

    startBtn.addEventListener('click', async () => {
        if (testRunning) return;
        testRunning = true;
        startBtn.disabled = true;
        startBtn.textContent = 'Test en cours...';
        downloadSpeeds = [];
        gaugeText.textContent = '0 Mbps';
        updateGauge(0, 0);
        speedInfo.textContent = '';

        const testDuration = 20000; // 20 secondes
        const interval = 2000; // mesure toutes les 2 secondes
        const endTime = Date.now() + testDuration;

        const testLoop = setInterval(async () => {
            if (Date.now() >= endTime) {
                clearInterval(testLoop);
                finishTest();
                return;
            }
            const speed = await measureSpeed();
            if (speed > 0) {
                downloadSpeeds.push(speed);
                // Calcul de la moyenne temporaire
                const avg = downloadSpeeds.reduce((a,b) => a+b, 0) / downloadSpeeds.length;
                const maxSpeed = 100; // échelle max 100 Mbps pour la jauge
                const percent = Math.min((avg / maxSpeed) * 100, 100);
                updateGauge(percent, avg);
                speedInfo.textContent = `Dernière mesure : ${speed.toFixed(1)} Mbps | Moyenne : ${avg.toFixed(1)} Mbps`;
            }
        }, interval);

        // Lance la première mesure immédiatement
        const firstSpeed = await measureSpeed();
        if (firstSpeed > 0) {
            downloadSpeeds.push(firstSpeed);
            updateGauge(Math.min((firstSpeed / 100) * 100, 100), firstSpeed);
        }

        function finishTest() {
            clearInterval(testLoop);
            testRunning = false;
            startBtn.disabled = false;
            startBtn.textContent = 'Démarrer le test (20s)';
            if (downloadSpeeds.length > 0) {
                const finalAvg = downloadSpeeds.reduce((a,b) => a+b, 0) / downloadSpeeds.length;
                updateGauge(Math.min((finalAvg / 100) * 100, 100), finalAvg);
                speedInfo.textContent = `Test terminé ! Moyenne sur 20s : ${finalAvg.toFixed(1)} Mbps`;
            } else {
                speedInfo.textContent = 'Aucune mesure réussie. Vérifiez votre connexion.';
            }
        }
    });

})();
