<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub complet – Calculatrice, Convertisseur, Pomodoro, Vérif. mdp, QR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0ff;
            padding-top: 80px;
        }
        .bg-particles {
            position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0;
        }
        .particle {
            position: absolute; width:2px; height:2px; background:#00e5ff; border-radius:50%;
            animation: float 6s infinite alternate; opacity:0.4;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-50px) translateX(20px); opacity:0.1; }
        }
        /* Barre de navigation en haut */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(20,20,40,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #00e5ff44;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .nav-btn {
            background: transparent;
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }
        .nav-btn.active {
            background: #00e5ff;
            color: #0a0a14;
            box-shadow: 0 0 20px #00e5ff;
        }
        /* Carte principale */
        .app {
            background: rgba(20,20,40,0.75);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(0,229,255,0.25);
            box-shadow: 0 0 40px rgba(0,229,255,0.15);
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px;
        }
        .tab {
            display: none;
            animation: fade 0.3s;
        }
        .tab.active {
            display: block;
        }
        @keyframes fade {
            from { opacity:0; transform: translateY(5px); }
            to { opacity:1; transform: translateY(0); }
        }
        /* Calculatrice */
        .calc-display {
            background: rgba(10,15,25,0.8);
            border: 1px solid #b388ff;
            border-radius: 12px;
            padding: 20px 15px;
            font-size: 2rem;
            text-align: right;
            color: #e0e0ff;
            min-height: 70px;
            word-break: break-all;
            margin-bottom: 15px;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .key {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 18px 0;
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
            user-select: none;
            font-weight: bold;
        }
        .key:active {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 20px #00e5ff;
            transform: scale(0.95);
        }
        .key.operator {
            border-color: #ff4081;
            color: #ff4081;
        }
        .key.operator:active {
            background: #ff4081;
            color: white;
        }
        .key.equals {
            background: #00e5ff;
            color: #0a0a14;
            border-color: #00e5ff;
        }
        .key.equals:active {
            box-shadow: 0 0 30px #00e5ff;
        }
        .key.clear {
            border-color: #ff4081;
            color: #ff4081;
        }
        /* Convertisseur (sans table) */
        .converter-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        select, input {
            background: rgba(255,255,255,0.05);
            border: 1px solid #b388ff;
            border-radius: 10px;
            color: #e0e0ff;
            padding: 10px 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        select:focus, input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px #00e5ff55;
        }
        option {
            background: #1a1a2e;
            color: #e0e0ff;
        }
        .result-badge {
            background: rgba(0,229,255,0.1);
            border: 1px solid #00e5ff;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            color: #00e5ff;
            font-size: 1.2rem;
        }
        /* Pomodoro */
        .pomodoro-display {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            color: #00e5ff;
            text-shadow: 0 0 20px #00e5ff;
            margin: 10px 0;
            letter-spacing: 3px;
        }
        .pomo-btn {
            background: #00e5ff;
            color: #0a0a14;
            border: none;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pomo-btn.reset {
            background: transparent;
            border: 1px solid #ff4081;
            color: #ff4081;
        }
        .pomo-btn.reset:hover {
            background: #ff4081;
            color: white;
        }
        /* Vérificateur de mot de passe */
        .strength-meter {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            background: #ff4081;
            border-radius: 10px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-label {
            text-align: center;
            font-weight: bold;
            color: #b388ff;
        }
        /* QR */
        .qr-container {
            text-align: center;
        }
        .qr-container img {
            background: white;
            padding: 10px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div class="bg-particles" id="particles"></div>

<!-- Barre du haut -->
<div class="top-nav" id="topNav">
    <button class="nav-btn active" data-tab="calc">🧮 Calcul</button>
    <button class="nav-btn" data-tab="conv">🔄 Conv</button>
    <button class="nav-btn" data-tab="pomo">🍅 Pomo</button>
    <button class="nav-btn" data-tab="pass">🔐 Mdp</button>
    <button class="nav-btn" data-tab="qr">📱 QR</button>
</div>

<!-- Contenu principal -->
<div class="app">
    <!-- Calculatrice -->
    <div class="tab active" id="tab-calc">
        <div class="calc-display" id="calcDisplay">0</div>
        <div class="keys">
            <button class="key clear" data-action="clear">AC</button>
            <button class="key" data-action="back">⌫</button>
            <button class="key" data-action="pi">π</button>
            <button class="key operator" data-action="/">÷</button>

            <button class="key" data-action="7">7</button>
            <button class="key" data-action="8">8</button>
            <button class="key" data-action="9">9</button>
            <button class="key operator" data-action="*">×</button>

            <button class="key" data-action="4">4</button>
            <button class="key" data-action="5">5</button>
            <button class="key" data-action="6">6</button>
            <button class="key operator" data-action="-">−</button>

            <button class="key" data-action="1">1</button>
            <button class="key" data-action="2">2</button>
            <button class="key" data-action="3">3</button>
            <button class="key operator" data-action="+">+</button>

            <button class="key" data-action="0">0</button>
            <button class="key" data-action=".">.</button>
            <button class="key" data-action="sqrt">√</button>
            <button class="key equals" data-action="=">=</button>
        </div>
    </div>

    <!-- Convertisseur (pas de table de référence) -->
    <div class="tab" id="tab-conv">
        <div class="converter-box">
            <select id="unitCategory">
                <option value="volume">Volume</option>
                <option value="masse">Masse</option>
                <option value="longueur">Longueur</option>
                <option value="température">Température</option>
            </select>
            <div class="row">
                <input type="number" id="convInput" value="1" step="any" style="width:100px;">
                <select id="fromUnit"></select>
                <span style="color:#ff4081; font-size:1.5rem;">=</span>
                <select id="toUnit"></select>
            </div>
            <div class="result-badge" id="convResult">1 litre = 1000 mL</div>
        </div>
    </div>

    <!-- Pomodoro -->
    <div class="tab" id="tab-pomo">
        <div class="pomodoro-display" id="pomoDisplay">25:00</div>
        <div class="row" style="justify-content:center;">
            <button class="pomo-btn" id="pomoStart">Démarrer</button>
            <button class="pomo-btn reset" id="pomoReset">Reset</button>
        </div>
        <div class="row" style="justify-content:center; margin-top:15px; gap:8px;">
            <button class="nav-btn" data-duration="25" style="font-size:0.8rem;">25 min</button>
            <button class="nav-btn" data-duration="15" style="font-size:0.8rem;">15 min</button>
            <button class="nav-btn" data-duration="5" style="font-size:0.8rem;">5 min</button>
        </div>
    </div>

    <!-- Vérificateur de mot de passe -->
    <div class="tab" id="tab-pass">
        <input type="text" id="passwordInput" placeholder="Tape un mot de passe" autocomplete="off" style="width:100%; margin-bottom:10px;">
        <div class="strength-meter">
            <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-label" id="strengthLabel">Entrez un mot de passe</div>
        <ul style="color:#b388ff; font-size:0.85rem; margin-top:10px; padding-left:20px;">
            <li>8+ caractères</li>
            <li>Majuscules & minuscules</li>
            <li>Chiffres</li>
            <li>Symboles</li>
        </ul>
    </div>

    <!-- QR Code -->
    <div class="tab" id="tab-qr">
        <div class="qr-container">
            <input type="text" id="qrText" placeholder="Texte ou URL" style="width:100%; margin-bottom:10px;">
            <button class="pomo-btn" id="qrGenerate">Créer QR</button>
            <div style="margin-top:15px;">
                <img id="qrImage" src="" alt="QR Code" style="display:none; max-width:200px;">
            </div>
        </div>
    </div>
</div>

<script>
(() => {
    // Particules
    const particles = document.getElementById('particles');
    for (let i=0; i<40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'%';
        p.style.top = Math.random()*100+'%';
        p.style.animationDelay = Math.random()*8+'s';
        p.style.background = i%2 ? '#00e5ff' : '#b388ff';
        particles.appendChild(p);
    }

    // Navigation onglets
    const navBtns = document.querySelectorAll('.nav-btn[data-tab]');
    const tabs = document.querySelectorAll('.tab');
    navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            navBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tabs.forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    // ========== CALCULATRICE ==========
    let expression = '';
    const display = document.getElementById('calcDisplay');
    function updateDisplay() {
        display.textContent = expression || '0';
    }
    document.querySelector('.keys').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const action = btn.dataset.action;
        if (action === 'clear') {
            expression = '';
            updateDisplay();
        } else if (action === 'back') {
            expression = expression.slice(0, -1);
            updateDisplay();
        } else if (action === '=') {
            try {
                let ex = expression.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
                ex = ex.replace(/π/g, Math.PI);
                ex = ex.replace(/√/g, 'Math.sqrt');
                const result = Function('"use strict"; return ('+ex+')')();
                expression = result.toString();
                updateDisplay();
            } catch {
                display.textContent = 'Erreur';
                expression = '';
            }
        } else if (action === 'sqrt') {
            expression += '√(';
            updateDisplay();
        } else if (action === 'pi') {
            expression += 'π';
            updateDisplay();
        } else {
            expression += action;
            updateDisplay();
        }
    });

    // ========== CONVERTISSEUR (sans table) ==========
    const unitData = {
        volume: {
            units: { 'litre (L)':1, 'millilitre (mL)':1000, 'mètre cube (m³)':0.001, 'gallon US':0.264172, 'pinte US':2.11338, 'cuillère à soupe':66.6667 },
            base: 'litre (L)'
        },
        masse: {
            units: { 'kilogramme (kg)':1, 'gramme (g)':1000, 'milligramme (mg)':1e6, 'livre (lb)':2.20462, 'once (oz)':35.274 },
            base: 'kilogramme (kg)'
        },
        longueur: {
            units: { 'mètre (m)':1, 'kilomètre (km)':0.001, 'centimètre (cm)':100, 'millimètre (mm)':1000, 'pied (ft)':3.28084, 'pouce (in)':39.3701, 'mile':0.000621371 },
            base: 'mètre (m)'
        },
        température: {
            units: { 'Celsius': 'c', 'Fahrenheit': 'f', 'Kelvin': 'k' },
            base: 'Celsius'
        }
    };

    const categorySelect = document.getElementById('unitCategory');
    const fromSelect = document.getElementById('fromUnit');
    const toSelect = document.getElementById('toUnit');
    const convInput = document.getElementById('convInput');
    const convResult = document.getElementById('convResult');

    function populateUnits() {
        const cat = categorySelect.value;
        const units = unitData[cat].units;
        fromSelect.innerHTML = '';
        toSelect.innerHTML = '';
        Object.keys(units).forEach(u => {
            fromSelect.innerHTML += `<option value="${u}">${u}</option>`;
            toSelect.innerHTML += `<option value="${u}">${u}</option>`;
        });
        fromSelect.value = unitData[cat].base;
        toSelect.value = Object.keys(units)[1] || unitData[cat].base;
        convert();
    }

    function convert() {
        const cat = categorySelect.value;
        const value = parseFloat(convInput.value);
        if (isNaN(value)) {
            convResult.textContent = 'Valeur invalide';
            return;
        }
        const fromUnit = fromSelect.value;
        const toUnit = toSelect.value;
        if (cat === 'température') {
            let celsius;
            if (fromUnit === 'Celsius') celsius = value;
            else if (fromUnit === 'Fahrenheit') celsius = (value-32)*5/9;
            else if (fromUnit === 'Kelvin') celsius = value-273.15;
            let result;
            if (toUnit === 'Celsius') result = celsius;
            else if (toUnit === 'Fahrenheit') result = celsius*9/5+32;
            else if (toUnit === 'Kelvin') result = celsius+273.15;
            convResult.textContent = `${result.toFixed(2)} ${toUnit}`;
        } else {
            const base = value / unitData[cat].units[fromUnit];
            const result = base * unitData[cat].units[toUnit];
            convResult.textContent = `${result.toFixed(4)} ${toUnit}`;
        }
    }

    categorySelect.addEventListener('change', populateUnits);
    fromSelect.addEventListener('change', convert);
    toSelect.addEventListener('change', convert);
    convInput.addEventListener('input', convert);

    populateUnits();

    // ========== POMODORO ==========
    let pomoInterval, pomoTime = 25*60, pomoRunning = false;
    const pomoDisplay = document.getElementById('pomoDisplay');
    const pomoStart = document.getElementById('pomoStart');
    const pomoReset = document.getElementById('pomoReset');
    function updatePomoDisplay() {
        const m = Math.floor(pomoTime/60), s = pomoTime%60;
        pomoDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    pomoStart.addEventListener('click', () => {
        if (pomoRunning) {
            clearInterval(pomoInterval);
            pomoRunning = false;
            pomoStart.textContent = 'Démarrer';
        } else {
            if (pomoTime <= 0) pomoTime = 25*60;
            pomoInterval = setInterval(() => {
                if (pomoTime > 0) {
                    pomoTime--;
                    updatePomoDisplay();
                } else {
                    clearInterval(pomoInterval);
                    pomoRunning = false;
                    pomoStart.textContent = 'Démarrer';
                    alert('Pomodoro terminé !');
                }
            }, 1000);
            pomoRunning = true;
            pomoStart.textContent = 'Pause';
        }
    });
    pomoReset.addEventListener('click', () => {
        clearInterval(pomoInterval);
        pomoRunning = false;
        pomoTime = 25*60;
        updatePomoDisplay();
        pomoStart.textContent = 'Démarrer';
    });
    document.querySelectorAll('[data-duration]').forEach(btn => {
        btn.addEventListener('click', () => {
            const mins = parseInt(btn.dataset.duration);
            pomoTime = mins*60;
            updatePomoDisplay();
            if (pomoRunning) {
                clearInterval(pomoInterval);
                pomoRunning = false;
                pomoStart.textContent = 'Démarrer';
            }
        });
    });
    updatePomoDisplay();

    // ========== VÉRIFICATEUR DE MOT DE PASSE ==========
    const passwordInput = document.getElementById('passwordInput');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');

    function checkStrength(password) {
        let score = 0;
        if (password.length >= 8) score++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
        if (/\d/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;
        return score;
    }

    passwordInput.addEventListener('input', () => {
        const pwd = passwordInput.value;
        const score = checkStrength(pwd);
        let width = (score / 4) * 100;
        strengthFill.style.width = width + '%';
        if (pwd === '') {
            strengthFill.style.width = '0%';
            strengthLabel.textContent = 'Entrez un mot de passe';
            strengthLabel.style.color = '#b388ff';
            return;
        }
        if (score <= 1) {
            strengthFill.style.background = '#ff4081';
            strengthLabel.textContent = 'Faible';
            strengthLabel.style.color = '#ff4081';
        } else if (score === 2 || score === 3) {
            strengthFill.style.background = '#ffb74d';
            strengthLabel.textContent = 'Moyen';
            strengthLabel.style.color = '#ffb74d';
        } else {
            strengthFill.style.background = '#66bb6a';
            strengthLabel.textContent = 'Fort';
            strengthLabel.style.color = '#66bb6a';
        }
    });

    // ========== QR CODE ==========
    const qrText = document.getElementById('qrText');
    const qrGenerate = document.getElementById('qrGenerate');
    const qrImage = document.getElementById('qrImage');
    qrGenerate.addEventListener('click', () => {
        const text = qrText.value.trim();
        if (!text) return;
        qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
        qrImage.style.display = 'block';
    });

})();
</script>
</body>
</html>
